name: Release Published
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - run: npm install
      # - run: npm run test
      - uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4.1.5
        with:
          token: ${{ secrets.NPM_PUBLISH_TOKEN }}
          access: public
      - name: getVersion
        id: getVersion
        shell: bash
        run: |
          VERSION=$(npm info . --json version | sed -e 's/"//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: flowfuse/github-actions-workflows/actions/update-nr-flows@v0.64.0
        with:
          package: '@flowfuse/node-red-function-gpt'
          version: ${{ steps.getVersion.outputs.version }}